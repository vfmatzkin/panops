name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1.16.0
        with:
          toolchain: stable
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1.16.0
        with:
          toolchain: stable
          components: clippy
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    env:
      PANOPS_MODEL: ${{ github.workspace }}/.panops-models/ggml-tiny-q5_1.bin
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1.16.0
        with:
          toolchain: stable
      # Linux runner pool has heterogeneous CPUs; whisper.cpp's -march=native
      # build segfaults (SIGILL) when build-host SIMD features differ from
      # run-host. Compile but don't run on Linux. macOS is the primary target.
      - name: Cache Whisper model
        if: matrix.os == 'macos-latest'
        uses: actions/cache@v4
        with:
          path: .panops-models
          key: ggml-tiny-q5_1-${{ hashFiles('crates/panops-portable/src/model.rs') }}
      - name: Ensure model
        if: matrix.os == 'macos-latest'
        shell: bash
        env:
          MODEL_SHA256: 818710568da3ca15689e31a743197b520007872ff9576237bda97bd1b469c3d7
        run: |
          mkdir -p .panops-models
          if [ ! -f "$PANOPS_MODEL" ]; then
            curl -fL -o "$PANOPS_MODEL.partial" \
              https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-tiny-q5_1.bin
            mv "$PANOPS_MODEL.partial" "$PANOPS_MODEL"
          fi
          actual=$(shasum -a 256 "$PANOPS_MODEL" | awk '{print $1}')
          if [ "$actual" != "$MODEL_SHA256" ]; then
            echo "model checksum mismatch: expected $MODEL_SHA256, got $actual" >&2
            rm -f "$PANOPS_MODEL"
            exit 1
          fi
      - uses: taiki-e/install-action@v2.75.27
        if: matrix.os == 'macos-latest'
        with:
          tool: cargo-nextest
      - name: Compile tests (linux)
        if: matrix.os == 'ubuntu-latest'
        run: cargo test --workspace --locked --no-run
      - name: Run tests (macos)
        if: matrix.os == 'macos-latest'
        run: cargo nextest run --workspace --locked
      - name: Doc tests (macos)
        if: matrix.os == 'macos-latest'
        run: cargo test --workspace --locked --doc

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2.0.17
        with:
          command: check all

  typos:
    name: typos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: crate-ci/typos@v1.46.0

  audit-scheduled:
    name: scheduled audit
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2.0.17
        with:
          command: check advisories
