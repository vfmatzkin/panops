name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1.16.0
        with:
          toolchain: stable
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1.16.0
        with:
          toolchain: stable
          components: clippy
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    env:
      PANOPS_MODEL: ${{ github.workspace }}/.panops-models/ggml-tiny-q5_1.bin
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1.16.0
        with:
          toolchain: stable
      - name: Cache Whisper model
        uses: actions/cache@v4
        with:
          path: .panops-models
          key: ggml-tiny-q5_1-${{ hashFiles('crates/panops-portable/src/model.rs') }}
      - name: Ensure model
        shell: bash
        run: |
          mkdir -p .panops-models
          if [ ! -f "$PANOPS_MODEL" ]; then
            curl -fL -o "$PANOPS_MODEL" \
              https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-tiny-q5_1.bin
          fi
      - uses: taiki-e/install-action@v2.75.27
        with:
          tool: cargo-nextest
      - run: cargo nextest run --workspace --locked
      - run: cargo test --workspace --locked --doc

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2.0.17
        with:
          command: check all

  typos:
    name: typos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: crate-ci/typos@v1.46.0

  audit-scheduled:
    name: scheduled audit
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2.0.17
        with:
          command: check advisories
