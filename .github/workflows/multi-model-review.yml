name: Multi-Model Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

# Cancel an in-flight review for the same PR+model when a new push lands.
# Without this, force-pushes and rapid follow-ups stack reviewer jobs that
# burn API credits and post stale comments.
concurrency:
  group: multi-model-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    # Forked PRs don't have access to repo secrets; skip silently.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    strategy:
      # Don't cancel the second review if one model errors.
      fail-fast: false
      matrix:
        include:
          - model: qwen3.6-plus
            label: "Qwen 3.6 Plus"
          - model: glm-5
            label: "GLM-5"
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install claude CLI + brave-search MCP
        # @brave/brave-search-mcp-server is Brave's official package
        # (the @modelcontextprotocol/server-brave-search namespace was
        # deprecated; Brave forked + maintains theirs).
        run: |
          npm install -g \
            @anthropic-ai/claude-code \
            @brave/brave-search-mcp-server

      - name: Write MCP config (brave-search only)
        env:
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          MCP_DIR: /home/runner/.claude-review-${{ matrix.model }}
        run: |
          # jq construction is JSON-safe regardless of what characters
          # the BRAVE_API_KEY contains (qwen review of this workflow
          # caught the heredoc-interpolation hazard).
          mkdir -p "$MCP_DIR"
          jq -n --arg k "$BRAVE_API_KEY" '{
            mcpServers: {
              "brave-search": {
                command: "npx",
                args: ["-y", "@brave/brave-search-mcp-server"],
                env: { BRAVE_API_KEY: $k }
              }
            }
          }' > "$MCP_DIR/.mcp.json"

      - name: Fetch PR description
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr view ${{ github.event.pull_request.number }} \
            --json title,body \
            --jq '"# " + .title + "\n\n" + (.body // "(no description)")' \
            > /tmp/pr-meta.md

      - name: Run review (${{ matrix.label }})
        env:
          ANTHROPIC_BASE_URL: https://coding-intl.dashscope.aliyuncs.com/apps/anthropic
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.BAILIAN_CODING_PLAN_API_KEY }}
          # ANTHROPIC_API_KEY="" is intentional: the claude CLI tries
          # ANTHROPIC_API_KEY first; we want it to fall through to
          # ANTHROPIC_AUTH_TOKEN against the DashScope endpoint.
          ANTHROPIC_API_KEY: ""
          ANTHROPIC_MODEL: ${{ matrix.model }}
          ANTHROPIC_DEFAULT_OPUS_MODEL: ${{ matrix.model }}
          ANTHROPIC_DEFAULT_SONNET_MODEL: ${{ matrix.model }}
          ANTHROPIC_DEFAULT_HAIKU_MODEL: ${{ matrix.model }}
          CLAUDE_CONFIG_DIR: /home/runner/.claude-review-${{ matrix.model }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          test -n "$ANTHROPIC_AUTH_TOKEN" \
            || { echo "ANTHROPIC_AUTH_TOKEN is empty — set BAILIAN_CODING_PLAN_API_KEY secret"; exit 1; }
          PR_META=$(cat /tmp/pr-meta.md)
          REPO_URL="https://github.com/${{ github.repository }}"
          PROMPT="You are a code reviewer for the panops repository.

          Start by reading AGENTS.md (always present) and any .github/*-instructions.md file the repo has at HEAD — those define project conventions, hex-arch invariants, and severity calibration. Use them as the rubric for this review.

          # PR description (what the author intends)

          ${PR_META}

          # What to review

          Review the diff between commits ${BASE_SHA} and ${HEAD_SHA} (currently checked out at HEAD). Cross-check: does the diff match what the description says? Flag mismatches.

          Focus areas in priority order:
          1. Correctness under failure (panic handling in spawn_blocking, SIGTERM mid-init, OnceLock terminal-state, blocking-pool leaks)
          2. Hex-architecture invariants (panops-core stays platform-free; no serde on domain errors)
          3. Stdout contract (only one println in panops-engine main; everything else through tracing)
          4. Telemetry creep (no env vars for user config; no phone-home)
          5. Intent / description mismatch

          For any external library API mentioned in the diff (jsonrpsee, tokio, sherpa-rs, whisper-rs), verify via the brave-search MCP — DO NOT use the WebSearch tool (disabled). Use mcp__brave-search__brave_web_search instead.

          # Output format (strict)

          Use this exact GitHub-flavored markdown structure. No preamble. No trailing commentary.

          If you have nothing to flag: write a single paragraph starting with 'Clean —'.

          Otherwise:

          - Group findings by severity, in order: blockers first, then suggestions, then notes.
          - Use these section headings exactly:
            \`#### 🛑 Blockers\`
            \`#### 💡 Suggestions\`
            \`#### ℹ️ Notes\`
          - Omit a section entirely if it has no findings.
          - Each finding is a list item shaped like:

            \`- **Title in bold.** [\\\`path:line\\\`](${REPO_URL}/blob/${HEAD_SHA}/path#Lline) — explanation in one or two sentences. If quoting code, use a fenced \\\`rust\\\` block. If proposing a change, follow with a fenced \\\`suggestion\\\` block (GitHub Suggested Changes syntax).\`

          - Use real GitHub blob URLs of the form ${REPO_URL}/blob/${HEAD_SHA}/<path>#L<line> so file:line refs are clickable.
          - Use \\\`backticks\\\` around identifiers, types, file paths, and line numbers.
          - Quote multi-line code in fenced blocks with the right language tag (\\\`rust\\\`, \\\`yaml\\\`, \\\`bash\\\`, etc.).
          - Be terse. Lead with what's wrong, then why, then the fix. No praise. No restating the diff.
          - Never include the literal value of any secret, key, or token, even partially. Refer to them by env var name only."

          # Capture exit code separately so partial output (e.g. on
          # max-turns hit) still posts as the review body.
          set +e
          claude --bare -p "$PROMPT" \
            --allowedTools 'Read Glob Grep Bash(git*) mcp__brave-search__brave_web_search' \
            --disallowedTools 'WebSearch WebFetch' \
            --max-turns 15 \
            < /dev/null \
            > /tmp/review.md 2>&1
          CLAUDE_EXIT=$?
          set -e
          if [ "$CLAUDE_EXIT" -ne 0 ]; then
            printf '\n\n_(claude exited %d — output above is partial)_\n' "$CLAUDE_EXIT" >> /tmp/review.md
          fi

      - name: Redact secrets in review output
        # Belt-and-braces. GitHub Actions masks secrets in workflow LOGS
        # but not in files we write or comments we post. Scrub the
        # known literal values + apply generic vendor-pattern regex
        # before publishing the review to the PR.
        env:
          BAILIAN: ${{ secrets.BAILIAN_CODING_PLAN_API_KEY }}
          BRAVE: ${{ secrets.BRAVE_API_KEY }}
        run: |
          python3 - <<'PY'
          import os
          import re

          REDACT = "★★★REDACTED★★★"
          path = "/tmp/review.md"
          text = open(path).read()

          # 1. Literal substitution for the two known secrets in env.
          for var in ("BAILIAN", "BRAVE"):
              v = os.environ.get(var, "")
              if v and len(v) >= 12:
                  text = text.replace(v, REDACT)

          # 2. Vendor-pattern regex (mirrors ~/.claude/scripts/redact-secrets.py).
          patterns = [
              r"sk-ant-[A-Za-z0-9_\-]{50,}",
              r"sk-proj-[A-Za-z0-9_\-]{20,}",
              r"sk-svcacct-[A-Za-z0-9_\-]{20,}",
              r"sk-[A-Za-z0-9]{32,}",
              r"sk-sp-[A-Za-z0-9]{32,}",
              r"ghp_[A-Za-z0-9]{30,}",
              r"gho_[A-Za-z0-9]{30,}",
              r"ghu_[A-Za-z0-9]{30,}",
              r"ghs_[A-Za-z0-9]{30,}",
              r"github_pat_[A-Za-z0-9_]{60,}",
              r"AKIA[A-Z0-9]{16}",
              r"AIza[A-Za-z0-9_\-]{30,}",
              r"xox[baprs]-[A-Za-z0-9\-]{10,}",
              r"hf_[A-Za-z0-9]{30,}",
              r"BSA[A-Za-z0-9_\-]{20,}",
          ]
          for pat in patterns:
              text = re.sub(pat, REDACT, text)

          # 3. Generic key=value shapes.
          text = re.sub(
              r"((?i:api[_\-]?key|access[_\-]?key|secret[_\-]?key|secret|password|passwd|token|bearer|credential|auth(?:orization)?|private[_\-]?key))\s*[:=]\s*['\"]?([A-Za-z0-9_\-/+=.]{16,})['\"]?",
              lambda m: m.group(0).replace(m.group(2), REDACT),
              text,
          )

          # 4. PEM private-key blocks.
          text = re.sub(
              r"-----BEGIN [A-Z ]*PRIVATE KEY-----.*?-----END [A-Z ]*PRIVATE KEY-----",
              REDACT,
              text,
              flags=re.DOTALL,
          )

          open(path, "w").write(text)
          print("redaction complete")
          PY

      - name: Post review comment (${{ matrix.label }})
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          # HTML marker so we can find this model's prior comment and
          # edit it in place — keeps the PR thread tidy across pushes.
          MARKER: "<!-- multi-model-review:${{ matrix.model }} -->"
        run: |
          {
            echo "${MARKER}"
            echo "### ${{ matrix.label }}"
            echo
            cat /tmp/review.md
          } > /tmp/comment.md

          EXISTING=$(gh api "repos/${REPO}/issues/${PR}/comments" \
            --paginate \
            --jq ".[] | select(.body | contains(\"${MARKER}\")) | .id" \
            | head -1)

          if [ -n "$EXISTING" ]; then
            gh api -X PATCH "repos/${REPO}/issues/comments/${EXISTING}" \
              --field body=@/tmp/comment.md
            echo "edited existing comment ${EXISTING}"
          else
            gh pr comment "${PR}" --body-file /tmp/comment.md
            echo "posted new comment"
          fi
