name: Qwen Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  qwen-review:
    # Forked PRs don't have access to repo secrets; skip silently.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install claude CLI + brave-search MCP
        run: |
          npm install -g \
            @anthropic-ai/claude-code \
            @modelcontextprotocol/server-brave-search

      - name: Write MCP config (brave-search only)
        env:
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
        run: |
          mkdir -p $HOME/.claude-qwen
          cat > $HOME/.claude-qwen/.mcp.json <<EOF
          {
            "mcpServers": {
              "brave-search": {
                "command": "npx",
                "args": ["-y", "@modelcontextprotocol/server-brave-search"],
                "env": { "BRAVE_API_KEY": "${BRAVE_API_KEY}" }
              }
            }
          }
          EOF

      - name: Run review
        env:
          # Direct Anthropic-compatible endpoint — no adapter needed.
          ANTHROPIC_BASE_URL: https://coding-intl.dashscope.aliyuncs.com/apps/anthropic
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.BAILIAN_CODING_PLAN_API_KEY }}
          ANTHROPIC_API_KEY: ""
          # qwen3.6-plus was the fastest+most thorough across the
          # available Coding Plan models (19s, caught the latent
          # panic-handling bug on PR #93 that single-tool review missed).
          ANTHROPIC_MODEL: qwen3.6-plus
          ANTHROPIC_DEFAULT_OPUS_MODEL: qwen3.6-plus
          ANTHROPIC_DEFAULT_SONNET_MODEL: qwen3.6-plus
          ANTHROPIC_DEFAULT_HAIKU_MODEL: qwen3.6-plus
          CLAUDE_CONFIG_DIR: ${{ github.workspace }}/../.claude-qwen
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # Move the MCP config into place under CLAUDE_CONFIG_DIR.
          mv $HOME/.claude-qwen $(dirname $CLAUDE_CONFIG_DIR)/$(basename $CLAUDE_CONFIG_DIR)
          PROMPT="You are a code reviewer for the panops repository.

          Read .github/copilot-instructions.md and AGENTS.md first — those define project conventions, hex-arch invariants, severity calibration. Use them as context for the review.

          Review the diff between commits ${BASE_SHA} and ${HEAD_SHA} (currently checked out). Focus areas in priority order:
          1. Correctness under failure (panic handling in spawn_blocking, SIGTERM mid-init, OnceLock terminal-state)
          2. Hex-architecture invariants (panops-core stays platform-free; no serde on domain errors)
          3. Stdout contract (only one println in panops-engine main)
          4. Telemetry creep (no env vars for user config; no phone-home)

          For any external library API mentioned in the diff (jsonrpsee, tokio, sherpa-rs, whisper-rs), verify your understanding via the brave-search MCP — DO NOT use the WebSearch tool (disabled). Use mcp__brave-search__brave_web_search instead.

          Output BLOCKERS / SUGGESTIONS / NOTES with file:line citations. Be terse, no praise. If nothing to flag say: 'Clean — nothing to flag.'"

          claude --bare -p "$PROMPT" \
            --allowedTools 'Read Glob Grep Bash(git*) mcp__brave-search__brave_web_search' \
            --disallowedTools 'WebSearch WebFetch' \
            --max-turns 10 \
            < /dev/null \
            > /tmp/qwen-review.md 2>&1 \
            || echo "(claude exited non-zero)" >> /tmp/qwen-review.md

      - name: Post review comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo "## Qwen review (qwen3.6-plus via Alibaba Coding Plan)"
            echo
            echo '<details><summary>Review</summary>'
            echo
            cat /tmp/qwen-review.md
            echo
            echo '</details>'
          } > /tmp/qwen-comment.md
          gh pr comment ${{ github.event.pull_request.number }} \
            --body-file /tmp/qwen-comment.md
