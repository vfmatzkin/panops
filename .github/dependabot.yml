version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      rust-deps:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    labels: ["dependencies", "rust"]
    commit-message:
      prefix: "deps"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      gh-actions:
        patterns: ["*"]
    labels: ["dependencies", "ci"]
    commit-message:
      prefix: "ci"
