pre-commit:
  parallel: true
  commands:
    fmt:
      glob: "*.rs"
      run: cargo fmt --all -- --check
    clippy:
      glob: "*.rs"
      run: cargo clippy --workspace --all-targets --locked -- -D warnings
    typos:
      run: typos
    deny:
      glob: "{Cargo.toml,Cargo.lock,**/Cargo.toml,deny.toml}"
      run: cargo deny check
  skip:
    - merge
    - rebase

commit-msg:
  commands:
    length:
      run: |
        head -1 "{1}" | awk 'length > 72 { exit 1 }'

